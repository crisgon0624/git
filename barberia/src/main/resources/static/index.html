<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonobarberShop - Login</title>
    <style>
        /* Diseño y Estilos */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        h1 {
            color: #d4af37; /* Dorado */
            font-size: 2.5rem;
            margin: 10px 0;
            text-transform: uppercase;
        }

        p {
            color: #d4af37;
            margin-bottom: 30px;
        }

        .btn-green {
            background-color: #00a800;
            color: white;
            border: none;
            padding: 15px 80px;
            border-radius: 10px;
            font-size: 1.2rem;
            margin: 10px 0;
            width: 350px;
            cursor: pointer;
        }

        .btn-blue {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 10px;
            font-size: 1.2rem;
            margin: 10px 0;
            width: 350px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        .link-text {
            color: #0000ff;
            text-decoration: underline;
            font-size: 0.9rem;
            margin: 5px 0;
            display: block;
            cursor: pointer;
        }

        .register-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="register-btn">Registrarme</button>

    <div class="logo-container">
        <img src="/tijera.png" alt="MonobarberShop Logo" width="200">
    </div>

    <h1>MONOBARBERSHOP</h1>
    <p>Conéctate con tu estilo</p>

    <div class="stars">⭐⭐⭐</div>

    <button class="btn-green">Usuario o correo</button>
    <button class="btn-green">contraseña</button>
    
    <a class="link-text">recuperar contraseña</a>

    <button class="btn-blue">INICIAR CON GOOGLE</button>

</body>
</html>
